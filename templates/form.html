{% extends "layout.html" %}

{% block content %}

<h1>Registration Form</h1>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

{% if success %}
    <p class="success">{{ success }}</p>
{% endif %}

<form method="POST">
    <label>Name:</label>
    <input type="text" name="name">

    <label>Email:</label>
    <input type="text" name="email">

    <button type="submit">Submit</button>
</form>

{% endblock %}
